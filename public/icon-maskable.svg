<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8edf2;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Background fills entire safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Clock face (smaller for maskable padding) -->
  <circle cx="256" cy="228" r="105" fill="url(#clock)"/>
  <circle cx="256" cy="228" r="95" fill="none" stroke="#1e3a5f" stroke-width="2.5" opacity="0.15"/>
  <!-- Hour markers -->
  <g stroke="#1e3a5f" stroke-width="3.5" stroke-linecap="round" opacity="0.3">
    <line x1="256" y1="129" x2="256" y2="146"/>
    <line x1="256" y1="310" x2="256" y2="327"/>
    <line x1="157" y1="228" x2="174" y2="228"/>
    <line x1="338" y1="228" x2="355" y2="228"/>
  </g>
  <!-- Hour hand -->
  <line x1="256" y1="228" x2="256" y2="172" stroke="#1e3a5f" stroke-width="7" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="228" x2="300" y2="188" stroke="#4a90d9" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="228" r="6.5" fill="#1e3a5f"/>
  <circle cx="256" cy="228" r="3.5" fill="#4a90d9"/>
  <!-- Text -->
  <text x="256" y="405" font-size="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="800" letter-spacing="5">HD</text>
</svg>
