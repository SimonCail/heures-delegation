<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8edf2;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="240" r="130" fill="url(#clock)"/>
  <circle cx="256" cy="240" r="118" fill="none" stroke="#1e3a5f" stroke-width="3" opacity="0.15"/>
  <!-- Hour markers -->
  <g stroke="#1e3a5f" stroke-width="4" stroke-linecap="round" opacity="0.3">
    <line x1="256" y1="118" x2="256" y2="138"/>
    <line x1="256" y1="342" x2="256" y2="362"/>
    <line x1="134" y1="240" x2="154" y2="240"/>
    <line x1="358" y1="240" x2="378" y2="240"/>
  </g>
  <!-- Small markers -->
  <g fill="#1e3a5f" opacity="0.15">
    <circle cx="310" cy="137" r="4"/>
    <circle cx="353" cy="177" r="4"/>
    <circle cx="353" cy="303" r="4"/>
    <circle cx="310" cy="343" r="4"/>
    <circle cx="202" cy="343" r="4"/>
    <circle cx="159" cy="303" r="4"/>
    <circle cx="159" cy="177" r="4"/>
    <circle cx="202" cy="137" r="4"/>
  </g>
  <!-- Hour hand -->
  <line x1="256" y1="240" x2="256" y2="170" stroke="#1e3a5f" stroke-width="8" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="240" x2="310" y2="190" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="8" fill="#1e3a5f"/>
  <circle cx="256" cy="240" r="4" fill="#4a90d9"/>
  <!-- Text -->
  <text x="256" y="440" font-size="72" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="800" letter-spacing="6">HD</text>
</svg>
